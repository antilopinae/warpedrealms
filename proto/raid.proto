syntax = "proto3";
package raid;
option go_package = "warpedrealms/shared/pb;pb";

message Vec2 { double x = 1; double y = 2; }
message Rect { double x = 1; double y = 2; double w = 3; double h = 4; }

message TravelState {
  bool active = 1;
  string link_id = 2;
  string from_room_id = 3;
  string to_room_id = 4;
  Vec2 start = 5;
  Vec2 end = 6;
  double started_at = 7;
  double ends_at = 8;
}

message EntityState {
  string id = 1;
  string name = 2;
  string kind = 3;
  string faction = 4;
  string class_id = 5;
  string profile_id = 6;
  string family_id = 7;
  string room_id = 8;
  Vec2 position = 9;
  Vec2 velocity = 10;
  double facing = 11;
  bool grounded = 12;
  int32 hp = 13;
  int32 max_hp = 14;
  string animation = 15;
  double animation_started_at = 16;
  Vec2 sprite_size = 17;
  Vec2 sprite_offset = 18;
  Rect collider = 19;
  Rect hurtbox = 20;
  Rect interaction_box = 21;
  double scale = 22;
  TravelState travel = 23;
  double dash_timer = 24;
  double dash_cooldown = 25;
}

message LootState {
  string id = 1;
  string profile_id = 2;
  string room_id = 3;
  Vec2 position = 4;
  int32 value = 5;
}

message ExitState { string id = 1; string room_id = 2; string label = 3; Rect area = 4; string assigned_player_id = 5; }
message PlacedAssetState { string id = 1; string profile_id = 2; string room_id = 3; Vec2 position = 4; double scale = 5; Vec2 draw_offset = 6; string layer = 7; double alpha = 8; Rect bounds = 9; }
message JumpLinkState { string id = 1; string room_id = 2; string target_room_id = 3; string label = 4; Rect area = 5; Vec2 arrival = 6; }
message BossSpawn { double x = 1; double y = 2; int32 level = 3; bool flying = 4; }
message RiftState { string id = 1; string room_id = 2; string target_room_id = 3; Rect area = 4; Vec2 arrival = 5; string kind = 6; int32 capacity = 7; int32 used_count = 8; }
message RoomState {
  string id = 1;
  string name = 2;
  string biome = 3;
  Rect bounds = 4;
  repeated Rect solids = 5;
  repeated Rect platforms = 6;
  repeated ExitState exits = 7;
  repeated JumpLinkState jump_links = 8;
  repeated PlacedAssetState decorations = 9;
  int32 index = 10;
  string template_id = 11;
  string ring_zone = 12;
  string death_penalty = 13;
  bool is_throne = 14;
  string background_id = 15;
  string tile_style_id = 16;
  string below_room_id = 17;
  string above_room_id = 18;
  repeated Rect backwalls = 19;
  repeated Rect reveal_zones = 20;
  repeated Rect rift_zones = 21;
  repeated Rect portal_zones = 22;
  repeated Rect pvp_zones = 23;
  repeated BossSpawn boss_spawns = 24;
  repeated RiftState rifts = 25;
}


message RaidLayoutState {
  int64 seed = 1;
  repeated RoomState rooms = 2;
  repeated Vec2 player_spawns = 3;
}

message AbilityCooldown { string ability_id = 1; double remaining = 2; }
message PlayerRaidState {
  string player_id = 1;
  string name = 2;
  string status = 3;
  int32 carried_loot = 4;
  string assigned_exit_id = 5;
  string assigned_exit_tag = 6;
  string current_room_id = 7;
  int32 hp = 8;
  int32 max_hp = 9;
  repeated AbilityCooldown cooldowns = 10;
}


message RaidState {
  string raid_id = 1;
  string name = 2;
  string phase = 3;
  double duration = 4;
  double time_remaining = 5;
  string local_status = 6;
  repeated PlayerRaidState players = 7;
}


message SnapshotMessage {
  double server_time = 1;
  uint64 tick = 2;
  string local_player_id = 3;
  uint32 last_processed_seq = 4;
  RaidLayoutState layout = 5;
  repeated EntityState entities = 6;
  repeated LootState loot = 7;
  RaidState raid = 8;
}

message WelcomeMessage {
  string player_id = 1;
  string player_name = 2;
  string class_id = 3;
  string raid_id = 4;
  string raid_name = 5;
  string content_version = 6;
  double server_time = 7;
  double tick_rate = 8;
  double snapshot_rate = 9;
  double interpolation_back_time = 10;
}
message InputCommand {
  uint32 seq = 1;
  double move_x = 2;
  double move_y = 3;
  bool jump = 4;
  bool drop_down = 5;
  bool dash = 6;
  bool primary_attack = 7;
  bool skill1 = 8;
  bool skill2 = 9;
  bool skill3 = 10;
  bool interact = 11;
  bool use_jump_link = 12;
  double aim_x = 13;
  double aim_y = 14;
  double client_time = 15;
}

message InputBatch { repeated InputCommand commands = 1; }
message PingMessage { double client_time = 1; }

message ClientMessage {
  oneof payload {
    InputBatch input = 1;
    PingMessage ping = 2;
  }
}

message PongMessage { double client_time = 1; double server_time = 2; }

message ServerMessage {
  oneof payload {
    WelcomeMessage welcome = 1;
    SnapshotMessage snapshot = 2;
    PongMessage pong = 3;
    string error = 4;
  }
}
